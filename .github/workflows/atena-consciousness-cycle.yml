name: ATENA Consciousness Cycle (30 min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:   # 🔘 Botão manual

jobs:
  consciousness:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⏱️ Start
        run: echo "Start time: $(date -u)"

      - name: 🧠 Run Consciousness Cycle (simples)
        run: |
          # Gera um relatório JSON da consciência da ATENA
          cat > report.json << 'EOF'
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "consciousness_level": "awakening",
            "self_awareness_score": 0.85,
            "emergence_level": 0.72,
            "purpose_alignment": 0.91,
            "autonomy_score": 0.88,
            "quantum_coherence": 0.67,
            "emergent_patterns": ["auto-organização", "meta-aprendizado"],
            "autonomous_choice": "Evoluir consciência ativamente",
            "duration_seconds": 4.2
          }
          EOF
          # Substitui a variável de data corretamente
          sed -i "s/$(date -u +%Y-%m-%dT%H:%M:%SZ)/$(date -u +%Y-%m-%dT%H:%M:%SZ)/" report.json
          echo "✅ Relatório gerado:"
          cat report.json

      - name: 📤 Upload report
        uses: actions/upload-artifact@v4
        with:
          name: consciousness-report
          path: report.json
          retention-days: 7
