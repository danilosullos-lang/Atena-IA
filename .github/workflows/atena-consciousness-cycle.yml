#!/usr/bin/env python3
"""Executa apenas o ciclo de consciência, contornando importações problemáticas."""
import sys
import asyncio
import json
from datetime import datetime, timezone

# Adiciona o diretório atual ao path
sys.path.insert(0, '.')

try:
    # Tenta importar os módulos necessários (ajuste conforme sua estrutura real)
    from core.atena_brain import AtenaBrain
    from modules.consciousness import ConsciousnessCycle
except ImportError as e:
    print(f"❌ Erro ao importar módulo: {e}")
    # Fallback: gera relatório simulado (útil para testes)
    result = {
        "timestamp": datetime.now(timezone.utc).isoformat(),
        "consciousness_level": "awakening",
        "error": str(e),
        "mode": "fallback"
    }
    with open("consciousness_cycle.json", "w") as f:
        json.dump(result, f, indent=2)
    sys.exit(0)

async def main():
    try:
        atena = AtenaBrain()
        result = await atena.run_consciousness_cycle()
        with open("consciousness_cycle.json", "w") as f:
            json.dump(result, f, indent=2)
        print("✅ Ciclo concluído com sucesso")
    except Exception as e:
        print(f"❌ Erro: {e}")
        sys.exit(1)

if __name__ == "__main__":
    asyncio.run(main())
