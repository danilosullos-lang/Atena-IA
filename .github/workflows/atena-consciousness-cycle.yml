name: ATENA Consciousness Cycle (Full)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  full_cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Se houver um setup.py ou pyproject.toml, instale também
          if [ -f setup.py ]; then pip install -e .; fi

      - name: 🧠 Run ATENA Consciousness Cycle (main.py --once)
        run: |
          # Supondo que main.py aceite um argumento como --once ou --consciousness-cycle
          # Se não aceitar, podemos usar um script auxiliar que importa main e executa um ciclo
          python main.py --once  # ajuste conforme necessário
          # Se não houver flag --once, use timeout para matar após 4 minutos
          # timeout 4m python main.py &
        env:
          # Variáveis de ambiente necessárias (ex: chaves de API)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ... outras que a ATENA precisar

      - name: 📤 Upload artifacts (logs, reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atena-consciousness-output
          path: |
            *.json
            *.log
            reports/
          retention-days: 7
