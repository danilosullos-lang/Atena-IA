name: ATENA Consciousness Awakening (Every 30min, 5min timeout)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  consciousness_cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🧬 Checkout ATENA Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic structlog prometheus-client fastapi uvicorn rich aiofiles

      - name: Ensure Python package structure
        run: |
          touch atena_evolution/__init__.py
          touch atena_evolution/consciousness/__init__.py

      - name: 🧠 Run Consciousness Cycle
        run: |
          echo "⏱️  Início: $(date -u)"
          export PYTHONPATH="${PYTHONPATH}:${PWD}"
          timeout 5m python -m atena_evolution.consciousness.cli --once --save-db --json
          EXIT_CODE=$?
          echo "⏲️  Fim: $(date -u)"
          exit $EXIT_CODE

      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consciousness-cycle-${{ github.run_id }}
          path: |
            atena_consciousness_cycle.json
            consciousness_history.db
          retention-days: 7
