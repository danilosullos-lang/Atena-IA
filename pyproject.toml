# pyproject.toml — ATENA Omega
# Build backend: setuptools (único; hatch removido para evitar conflito)
# Versão gerenciada via setuptools-scm (sem hardcode estático)

[build-system]
requires = [
    "setuptools>=69.0.0",
    "wheel>=0.42.0",
    "setuptools-scm>=8.0.0",
    "cython>=3.0.0",
    "numpy>=1.24.0",
]
build-backend = "setuptools.build_meta"

# =============================================================================
# PROJECT METADATA
# =============================================================================

[project]
name = "atena-omega"
dynamic = ["version"]
description = "ATENA Omega — Advanced Autonomous AI System with Self-Evolution"
readme = "README.md"
requires-python = ">=3.10,<3.13"
license = {text = "MIT"}
authors = [
    {name = "ATENA Auto Team",  email = "team@atena.ai"},
    {name = "Danilo",           email = "danilo@atena.ai"},
]
maintainers = [
    {name = "ATENA Core Team", email = "core@atena.ai"},
]
keywords = [
    "ai", "autonomous", "evolution", "llm", "multi-agent",
    "rag", "self-improving", "agentic", "automation",
    "quantum-inspired", "neural-symbolic", "cognitive-architecture",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
    "Natural Language :: Portuguese (Brazilian)",
    "Natural Language :: English",
]

# ---------------------------------------------------------------------------
# Core runtime dependencies
# ---------------------------------------------------------------------------
dependencies = [
    "requests>=2.31.0,<3.0.0",
    "aiohttp>=3.9.0,<4.0.0",
    "aiofiles>=23.2.1",
    "httpx>=0.25.0,<1.0.0",
    "numpy>=1.26.0,<2.0.0",
    "pandas>=2.1.0,<3.0.0",
    "polars>=0.20.0,<1.0.0",
    "anyio>=4.0.0",
    "uvloop>=0.19.0;sys_platform!='win32'",
    "rich>=13.7.0,<15.0.0",
    "click>=8.1.0,<9.0.0",
    "typer>=0.9.0,<1.0.0",
    "prompt-toolkit>=3.0.0,<4.0.0",
    "pydantic>=2.5.0,<3.0.0",
    "pydantic-settings>=2.1.0,<3.0.0",
    "msgspec>=0.18.0",
    "orjson>=3.9.0",
    "pyyaml>=6.0,<7.0",
    "tomli>=2.0.0;python_version<'3.11'",
    "python-dotenv>=1.0.0,<2.0.0",
    "beautifulsoup4>=4.12.0,<5.0.0",
    "lxml>=4.9.0,<6.0.0",
    "playwright>=1.40.0,<2.0.0",
    "selenium>=4.15.0,<5.0.0",
    "fastapi>=0.104.0,<1.0.0",
    "uvicorn[standard]>=0.24.0,<1.0.0",
    "websockets>=12.0,<14.0",
    "redis>=5.0.0,<6.0.0",
    "cachetools>=5.3.0,<6.0.0",
    "aiocache>=0.12.0",
    "cryptography>=41.0.0",
    "pycryptodome>=3.19.0",
    "jwcrypto>=1.5.0",
    "loguru>=0.7.0,<1.0.0",
    "structlog>=24.1.0",
    "python-multipart>=0.0.6",
    "python-dateutil>=2.8.0,<3.0.0",
    "tenacity>=8.2.0,<10.0.0",
