    "mkdocs-minify-plugin>=0.7.0",
    "mkdocs-git-revision-date-localized-plugin>=1.2.0",
    "sphinx>=7.2.0",
    "sphinx-rtd-theme>=1.3.0",
    "sphinx-autodoc-typehints>=1.24.0",
    "pydoctor>=23.9.0",
]
all = ["atena-omega[dev,prod,ml,vectordb,web,monitoring,distributed,db,security,testing,docs]"]

[project.urls]
Homepage      = "https://github.com/AtenaAuto/ATENA-"
Repository    = "https://github.com/AtenaAuto/ATENA-"
Documentation = "https://docs.atena.ai"
Issues        = "https://github.com/AtenaAuto/ATENA-/issues"
Changelog     = "https://github.com/AtenaAuto/ATENA-/releases"
Discord       = "https://discord.gg/atena"

[project.scripts]
atena            = "cli.main:app"
atena-daemon     = "daemon.manager:run"
atena-benchmark  = "benchmark.runner:main"
atena-self-heal  = "evolution.self_heal:main"
atena-monitor    = "monitoring.dashboard:start"

[project.entry-points."atena.plugins"]
memory = "plugins.memory:register"
vision = "plugins.vision:register"
audio  = "plugins.audio:register"
web    = "plugins.web_scraper:register"
api    = "plugins.api_gateway:register"

# =============================================================================
# VERCEL CONFIGURATION
# =============================================================================
[tool.vercel]
entrypoint = "core.atena_local_dashboard:Handler"

# =============================================================================
# BUILD — setuptools only
# =============================================================================

[tool.setuptools]
include-package-data = true
zip-safe             = false

[tool.setuptools.packages.find]
include = ["atena_omega*", "core*", "modules*", "protocols*", "skills*", "plugins*"]
exclude = [
    "tests*", "docs*", "examples*", "benchmarks*",
    "evolution*", "atena_evolution*",
]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.yml", "*.json", "*.md", "*.txt", "*.html", "*.css", "*.js", "*.wasm", "*.proto"]
"atena_omega" = ["py.typed"]

[tool.setuptools_scm]
write_to      = "atena_omega/_version.py"
version_scheme = "release-branch-semver"
local_scheme  = "no-local-version"

# =============================================================================
# BLACK
# =============================================================================

[tool.black]
line-length     = 88
target-version  = ["py310", "py311", "py312"]
include         = '\.pyi?$'
preview         = true
magic_trailing_comma = true
extend-exclude  = '''
/(
  \.eggs | \.git | \.hg | \.mypy_cache | \.tox | \.venv | \.env
  | build | dist | evolution | reference_dna | atena_evolution
  | analysis_reports | benchmarks | docs/_build | __pycache__
)/
'''

# =============================================================================
# ISORT
# =============================================================================

[tool.isort]
profile                     = "black"
line_length                 = 88
multi_line_output           = 3
include_trailing_comma      = true
force_grid_wrap             = 0
use_parentheses             = true
ensure_newline_before_comments = true
skip_glob                   = [
    "evolution/*", "reference_dna/*", "atena_evolution/*",
    "analysis_reports/*", "benchmarks/*",
]
known_first_party  = ["atena_omega", "core", "modules", "protocols", "skills", "plugins"]
known_third_party  = [
    "requests", "aiohttp", "numpy", "pandas", "polars",
    "rich", "typer", "pydantic", "loguru", "tenacity",
]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

# =============================================================================
# RUFF
# =============================================================================

[tool.ruff]
line-length    = 88
target-version = "py310"
src = ["atena_omega", "core", "modules", "protocols", "skills", "plugins"]
exclude = [
    "evolution", "reference_dna", "atena_evolution", "analysis_reports",
    "benchmarks", "docs", ".git", ".venv", "__pycache__", "build", "dist",
]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "A", "C4", "SIM",
    "RET", "ARG", "PTH", "RUF", "TCH", "PIE", "FLY", "PERF",
    "G", "LOG", "Q", "RSE", "SLF", "SLOT", "INT", "YTT",
]
ignore = ["E501", "B008", "C901", "SIM108", "RET505"]
preview  = true
fixable  = ["ALL"]
unfixable = []

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"__init__.py"     = ["F401", "D104"]
"tests/*"         = ["S101", "PLR2004", "D", "ARG"]
"experimental/*"  = ["ALL"]

# =============================================================================
# MYPY
# =============================================================================

[tool.mypy]
python_version           = "3.10"
warn_return_any          = true
warn_unused_configs      = true
disallow_untyped_defs    = true
disallow_incomplete_defs = true
check_untyped_defs       = true
disallow_untyped_decorators = true
no_implicit_optional     = true
warn_redundant_casts     = true
warn_unused_ignores      = true
warn_no_return           = true
warn_unreachable         = true
strict_equality          = true
strict_optional          = true
follow_imports           = "normal"
ignore_missing_imports   = true
show_error_codes         = true
pretty                   = true
color_output             = true
enable_error_code        = [
    "ignore-without-code", "redundant-expr", "truthy-bool",
    "overload-exists",     "possibly-undefined",
]

[[tool.mypy.overrides]]
module = ["astor.*", "chromadb.*", "faiss.*", "streamlit.*", "gradio.*", "langchain.*", "transformers.*", "torch.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
check_untyped_defs    = false

# =============================================================================
# PYLINT
# =============================================================================

[tool.pylint.main]
max-line-length  = 88
ignore           = [
    "evolution", "reference_dna", "atena_evolution",
    "analysis_reports", "tests", "docs",
]
ignore-patterns  = ["^test_.*\\.py$", ".*_test\\.py$"]
jobs             = 0

[tool.pylint."messages control"]
disable = [
    "C0111", "C0103", "R0913", "R0914", "W0212",
    "R0801", "R0902", "R0903", "R0904",
]
enable     = ["missing-module-docstring"]
good-names = ["i", "j", "k", "ex", "Run", "_", "x", "y", "z", "df", "ax", "id", "db", "fp", "cb", "ctx", "env"]
extension-pkg-allow-list = ["numpy", "pydantic", "polars"]

# =============================================================================
# PYTEST
# =============================================================================

[tool.pytest.ini_options]
minversion    = "7.4"
testpaths     = ["tests"]
python_files  = ["test_*.py", "*_test.py"]
python_classes = ["Test*", "*Test"]
python_functions = ["test_*"]
addopts = [
    "-ra", "--strict-markers", "--strict-config", "--tb=short",
    "--showlocals", "--maxfail=5", "-p", "no:cacheprovider",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "asyncio: marks tests as async",
    "security: security-related tests",
    "performance: performance benchmarks",
    "smoke: smoke tests for validation",
    "gpu: tests requiring GPU",
    "network: tests requiring network access",
]
asyncio_mode = "auto"
timeout      = 300

# =============================================================================
# COVERAGE / BANDIT / COMMITIZEN / CIBUILDWHEEL
# =============================================================================

[tool.coverage.run]
source = ["atena_omega", "core", "modules", "protocols", "skills", "plugins"]
omit = [
    "*/tests/*", "*/test_*.py", "*/__pycache__/*",
    "*/evolution/*", "*/reference_dna/*", "*/atena_evolution/*",
    "*/analysis_reports/*", "*/scripts/*", "*/__init__.py",
]
parallel    = true
concurrency = ["thread", "multiprocessing"]
branch      = true

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "def __repr__", "raise AssertionError", "raise NotImplementedError", "if __name__ == .__main__.:", "if TYPE_CHECKING:", "class .*\\bProtocol\\):", "@(abc\\.)?abstractmethod", "pass"]
omit         = ["*/__pycache__/*", "*/tests/*"]
precision    = 2
show_missing = true
fail_under   = 80

[tool.bandit]
exclude_dirs = ["tests", "evolution", "reference_dna", "atena_evolution", "analysis_reports", "docs", "examples"]
skips      = ["B101", "B601", "B603", "B607"]
severity   = "HIGH"
confidence = "HIGH"
recursive  = true
format     = "json"
output     = "bandit_report.json"

[tool.pyright]
include = ["atena_omega", "core", "modules", "protocols", "skills", "plugins", "scripts", "cli"]
exclude = ["**/__pycache__", "evolution", "atena_evolution", "analysis_reports", "tests", "docs", "examples"]
pythonVersion = "3.10"
typeCheckingMode = "strict"

[tool.commitizen]
name    = "cz_conventional_commits"
version = "3.2.0"
version_files = [
    "pyproject.toml:version = \"\\d+\\.\\d+\\.\\d+\"",
    "atena_omega/__init__.py:__version__ = \"\\d+\\.\\d+\\.\\d+\"",
]
tag_format      = "v$version"
bump_message    = "chore(release): bump version $current_version -> $new_version"
change_type_order = ["BREAKING", "feat", "fix", "refactor", "docs", "chore"]

[tool.cibuildwheel]
build    = "cp310-manylinux* cp311-manylinux* cp312-manylinux*"
archs    = ["auto64"]
test-command  = "pytest {project}/tests -v -m 'not slow'"
manylinux-x86_64-image = "manylinux2014"
build-frontend = "build"
