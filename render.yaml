services:
  - type: web
    name: atena-ia
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ATENA_ENV
        value: production
      - key: ENABLE_RATE_LIMIT
        value: "true"
      - key: ENABLE_CACHE
        value: "true"
      - key: PYTHONPATH
        value: .
