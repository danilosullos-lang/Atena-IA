  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7 — Health Check
  # ════════════════════════════════════════════════════════════════════════════
  health-check:
    name: "🏥 Health Check"
    needs: [evolve, audit]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Evaluate system health
        id: health
        run: |
          EVOLVE_OK=$([[ "${{ needs.evolve.result }}" == "success" || "${{ needs.evolve.result }}" == "skipped" ]] && echo 1 || echo 0)
          AUDIT_OK=$([[ "${{ needs.audit.result }}" == "success" ]] && echo 1 || echo 0)
          HEALTH=$(( EVOLVE_OK * 50 + AUDIT_OK * 50 ))
          
          echo "health_score=${HEALTH}" >> "$GITHUB_OUTPUT"
          
          if [[ ${HEALTH} -ge 80 ]]; then
            echo "status=healthy" >> "$GITHUB_OUTPUT"
            echo "✅ Sistema Saudável (${HEALTH}/100)"
          elif [[ ${HEALTH} -ge 50 ]]; then
            echo "status=degraded" >> "$GITHUB_OUTPUT"
            echo "⚠️ Sistema Degradado (${HEALTH}/100)"
          else
            echo "status=unhealthy" >> "$GITHUB_OUTPUT"
            echo "❌ Sistema Não Saudável (${HEALTH}/100)"
          fi
          
          echo "evolve_healthy=${EVOLVE_OK}" >> "$GITHUB_OUTPUT"
          echo "audit_healthy=${AUDIT_OK}" >> "$GITHUB_OUTPUT"

      - name: Export health metrics
        if: always()
        run: |
          {
            echo "ATENA_HEALTH_SCORE=${{ steps.health.outputs.health_score }}"
            echo "ATENA_HEALTH_STATUS=${{ steps.health.outputs.status }}"
            echo "ATENA_EVOLVE_HEALTHY=${{ steps.health.outputs.evolve_healthy }}"
            echo "ATENA_AUDIT_HEALTHY=${{ steps.health.outputs.audit_healthy }}"
            echo "ATENA_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_ENV"
