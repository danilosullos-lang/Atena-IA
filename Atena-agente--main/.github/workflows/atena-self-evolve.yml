# ══════════════════════════════════════════════════════════════════════════════
# ATENA Self-Evolve  —  workflow v3.3 (Ultra-Stable & Secured)
# ══════════════════════════════════════════════════════════════════════════════

name: ATENA Self-Evolve

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      run_repo_watchlist:
        description: "Executar scanner de repositórios de IA"
        required: false
        default: "true"
        type: boolean
      skip_evolve:
        description: "Pular ciclo de evolução (só auditorias)"
        required: false
        default: "false"
        type: boolean
      debug:
        description: "Ativar saída verbose"
        required: false
        default: "false"
        type: boolean
      force_full_cycle:
        description: "Forçar ciclo completo ignorando otimizações"
        required: false
        default: "false"
        type: boolean

permissions: {}

concurrency:
  group: atena-self-evolve-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_COLOR: "1"
  ATENA_AUTO_ENDPOINT_SETUP: "false"
  ATENA_STRICT_ENDPOINT_READY: "false"
  PYTHON_VERSION: "3.11"
  REQS_HASH: ${{ hashFiles('setup/requirements-pinned.txt', 'setup/requirements-dev.txt') }}
  TZ: "UTC"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — setup (com validação de segurança)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  setup:
    name: "⚙️ Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      venv-cache-key: ${{ steps.cache-key.outputs.key }}
      python-version: ${{ env.PYTHON_VERSION }}
      cache-hit: ${{ steps.cache-restore.outputs.cache-hit }}
      start-time: ${{ steps.timestamp.outputs.start-time }}

    steps:
      - name: Generate timestamp
        id: timestamp
        run: echo "start-time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compute venv cache key
        id: cache-key
        run: |
          KEY="venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ env.REQS_HASH }}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "Cache key: ${KEY}"

      - name: Restore venv cache
        id: cache-restore
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true' || inputs.force_full_cycle == 'true'
        timeout-minutes: 8
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip wheel setuptools

          for attempt in 1 2 3; do
            echo "::group::pip install tentativa ${attempt}/3"
            if pip install -r setup/requirements-pinned.txt -r setup/requirements-dev.txt; then
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [[ ${attempt} -lt 3 ]]; then
              echo "::warning::pip falhou na tentativa ${attempt}. Aguardando $((attempt * 15))s..."
              sleep $((attempt * 15))
            else
              echo "::error::pip install falhou após 3 tentativas."
              exit 1
            fi
          done

      - name: Validate Python environment
        run: |
          source .venv/bin/activate
          python -c "import sys; print(f'Python {sys.version}')"
          python -m pip list --format=freeze | wc -l | xargs -I{} echo "{} pacotes instalados"
          
          python -c "
          import importlib
          critical_modules = ['core', 'yaml', 'json', 'pathlib']
          for mod in critical_modules:
              try:
                  importlib.import_module(mod)
                  print(f'✓ {mod} disponível')
              except ImportError as e:
                  print(f'✗ {mod} faltando: {e}')
                  if mod != 'core':
                      raise
          "

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — evolve (com rate limiting)
  # ════════════════════════════════════════════════════════════════════════════
  evolve:
    name: "🧬 Evolve"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: inputs.skip_evolve != 'true'
    permissions:
      contents: write
      pull-requests: write

    outputs:
      status: ${{ steps.evolve-status.outputs.status }}
      score-file: ${{ steps.score.outputs.file }}
      generation: ${{ steps.score.outputs.generation }}
      best_score: ${{ steps.score.outputs.best_score }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Agi-uplift
        id: agi-uplift
        continue-on-error: true
        timeout-minutes: 12
        run: |
          set -uo pipefail
          source .venv/bin/activate
          
          echo "::group::agi-uplift execution"
          if bash ./atena agi-uplift 2>&1 | tee /tmp/agi-uplift.log; then
            EXIT=0
          else
            EXIT=${PIPESTATUS[0]}
          fi
          echo "::endgroup::"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"
          
          sleep 2

      - name: Digital organism live cycle
        id: organism
        continue-on-error: true
        timeout-minutes: 12
        run: |
          set -uo pipefail
          source .venv/bin/activate
          
          ITERATIONS=1
          BATCHES=1
          [[ "${{ inputs.force_full_cycle }}" == "true" ]] && ITERATIONS=2 BATCHES=2
          
          echo "::group::digital-organism-live-cycle (iter=${ITERATIONS}, batches=${BATCHES})"
          if bash ./atena digital-organism-live-cycle \
            --iterations ${ITERATIONS} \
            --batches ${BATCHES} \
            --recovery-attempts 2 \
            2>&1 | tee /tmp/organism.log; then
            EXIT=0
          else
            EXIT=${PIPESTATUS[0]}
          fi
          echo "::endgroup::"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Capture evolution status
        id: evolve-status
        run: |
          AGI=${{ steps.agi-uplift.outputs.exit_code || '1' }}
          ORG=${{ steps.organism.outputs.exit_code || '1' }}
          
          if [[ "${AGI}" -eq 0 && "${ORG}" -eq 0 ]]; then
            STATUS="success"
            echo "✅ Evolução completa"
          elif [[ "${AGI}" -eq 0 || "${ORG}" -eq 0 ]]; then
            STATUS="partial"
            echo "⚠️ Evolução parcial (agi=${AGI}, organism=${ORG})"
          else
            STATUS="failure"
            echo "❌ Evolução falhou"
          fi
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Extract score snapshot
        id: score
        run: |
          FILE="atena_evolution/atena_state.json"
          if [[ -f "${FILE}" ]]; then
            echo "file=${FILE}" >> "$GITHUB_OUTPUT"
            python3 -c "
import json, pathlib, sys
try:
    s = json.loads(pathlib.Path('${FILE}').read_text())
    gen = s.get('generation', 'N/A')
    score = s.get('best_score', 'N/A')
    with open('$GITHUB_OUTPUT', 'a') as f:
        f.write(f'generation={gen}\n')
        f.write(f'best_score={score}\n')
    print(f'📊 Geração: {gen} | Melhor score: {score}')
except Exception as e:
    print(f'⚠️ Erro: {e}')
    sys.exit(0)
            "
          else
            echo "file=" >> "$GITHUB_OUTPUT"
            echo "generation=N/A" >> "$GITHUB_OUTPUT"
            echo "best_score=N/A" >> "$GITHUB_OUTPUT"
            echo "::warning::Arquivo atena_state.json não encontrado"
          fi

      - name: Upload evolution logs
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: evolution-logs-${{ github.run_id }}
          path: |
            /tmp/agi-uplift.log
            /tmp/organism.log
            atena_evolution/atena_state.json
            atena_evolution/codex_reports/*.json
          if-no-files-found: ignore
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — probe (Correção da sintaxe de mapeamento da matriz)
  # ════════════════════════════════════════════════════════════════════════════
  probe:
    name: "🌐 Probe"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - query: "melhores APIs para app SaaS com analytics"
            label: "saas-apis"
            timeout: 120
          - query: "agenda de futebol e resultados do santos"
            label: "futebol"
            timeout: 90
          - query: "APIs para geração de imagem e mídia"
            label: "media-apis"
            timeout: 150

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Internet challenge — ${{ matrix.label }}
        id: ic
        continue-on-error: true
        timeout-minutes: ${{ matrix.timeout }}
        env:
          PROBE_QUERY: ${{ matrix.query }}
        run: |
          set -uo pipefail
          source .venv/bin/activate

          OUT="/tmp/probe-${{ matrix.label }}.json"
          LOG="/tmp/probe-${{ matrix.label }}.log"

          for attempt in 1 2 3; do
            echo "::group::Sonda '${{ matrix.label }}' — tentativa ${attempt}/3"
            if python -m core.internet_challenge \
              --query "${PROBE_QUERY}" \
              --cycles 1 \
              --output "${OUT}" \
              > "${LOG}" 2>&1; then
              EXIT=0
              echo "::endgroup::"
              break
            else
              EXIT=$?
              echo "::endgroup::"
              if [[ ${attempt} -lt 3 ]]; then
                echo "::warning::Tentativa ${attempt} falhou, aguardando..."
                sleep $((attempt * 10))
              fi
            fi
          done

          if [[ -f "${OUT}" ]]; then
            python3 -c "
import json
try:
    with open('${OUT}') as f:
        d = json.load(f)
    status = d.get('status', 'unknown')
    confidence = d.get('confidence', 'N/A')
    print(f'  status={status}  confidence={confidence}')
    if status == 'success':
        print('✅ Sonda bem-sucedida')
    else:
        print('⚠️ Status: ' + status)
except Exception as e:
    print(f'⚠️ Erro parsing: {e}')
            "
          else
            EXIT=1
            echo "::error::Arquivo de saída não gerado"
          fi
          
          echo "exit_code=${EXIT:-1}" >> "$GITHUB_OUTPUT"

      - name: Upload probe result
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: probe-${{ matrix.label }}-${{ github.run_id }}
          path: |
            /tmp/probe-${{ matrix.label }}.json
            /tmp/probe-${{ matrix.label }}.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce strict step result
        if: steps.ic.outputs.exit_code != '0'
        run: exit ${{ steps.ic.outputs.exit_code }}

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — watchlist
  # ════════════════════════════════════════════════════════════════════════════
  watchlist:
    name: "👁️ Watchlist"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: >
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.run_repo_watchlist == 'true')
    permissions:
      contents: read

    outputs:
      status: ${{ steps.wl-status.outputs.status }}
      repos_found: ${{ steps.wl-status.outputs.repos_found }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Scan AI GitHub repos
        id: scan
        continue-on-error: true
        run: |
          set -uo pipefail
          source .venv/bin/activate
          
          echo "::group::Scanning AI repositories"
          if python ./scripts/scan_github_ai_repos.py 2>&1 | tee /tmp/watchlist.log; then
            EXIT=0
          else
            EXIT=${PIPESTATUS[0]}
          fi
          echo "::endgroup::"
          
          REPOS=$(grep -c "Found.*repository" /tmp/watchlist.log 2>/dev/null || echo "0")
          echo "repos_found=${REPOS}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"
          echo "📊 Encontrados ${REPOS} repositórios"

      - name: Upload watchlist log
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: watchlist-${{ github.run_id }}
          path: |
            /tmp/watchlist.log
            watchlist_results_*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Capture watchlist status
        id: wl-status
        run: |
          EXIT=${{ steps.scan.outputs.exit_code || '0' }}
          REPOS=${{ steps.scan.outputs.repos_found || '0' }}
          STATUS=$([[ "${EXIT}" -eq 0 ]] && echo "success" || echo "failure")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "repos_found=${REPOS}" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — audit
  # ════════════════════════════════════════════════════════════════════════════
  audit:
    name: "🔍 Audit"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      security-events: write

    outputs:
      status: ${{ steps.audit-status.outputs.status }}
      endpoint_health: ${{ steps.health-metrics.outputs.health_score || 'N/A' }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Restore venv
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772b3dc2c31
        with:
          path: .venv
          key: ${{ needs.setup.outputs.venv-cache-key }}

      - name: Audit endpoint readiness
        id: audit-endpoint
        continue-on-error: true
        run: |
          echo "::group::Audit: Endpoint Readiness"
          if bash ./scripts/audit_agent_endpoint_readiness.sh 2>&1 | tee /tmp/audit-endpoint.log; then
            EXIT=0
          else
            EXIT=${PIPESTATUS[0]}
          fi
          echo "::endgroup::"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Audit repository connectivity
        id: audit-connectivity
        continue-on-error: true
        run: |
          echo "::group::Audit: Repository Connectivity"
          if bash ./scripts/audit_repo_connectivity.sh 2>&1 | tee /tmp/audit-connectivity.log; then
            EXIT=0
          else
            EXIT=${PIPESTATUS[0]}
          fi
          echo "::endgroup::"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Validate delivery workflow
        id: audit-delivery
        continue-on-error: true
        run: |
          echo "::group::Audit: Delivery Workflow"
          if bash ./scripts/test_atena_delivery.sh 2>&1 | tee /tmp/audit-delivery.log; then
            EXIT=0
          else
            EXIT=${PIPESTATUS[0]}
          fi
          echo "::endgroup::"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

      - name: Generate health metrics
        id: health-metrics
        if: always()
        run: |
          EP=${{ steps.audit-endpoint.outputs.exit_code || '1' }}
          CN=${{ steps.audit-connectivity.outputs.exit_code || '1' }}
          DL=${{ steps.audit-delivery.outputs.exit_code || '1' }}
          
          HEALTH=$(( (EP==0?33:0) + (CN==0?33:0) + (DL==0?34:0) ))
          echo "health_score=${HEALTH}" >> "$GITHUB_OUTPUT"
          echo "📊 Health Score: ${HEALTH}/100"

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: audit-logs-${{ github.run_id }}
          path: |
            /tmp/audit-endpoint.log
            /tmp/audit-connectivity.log
            /tmp/audit-delivery.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Capture audit status
        id: audit-status
        run: |
          EP=${{ steps.audit-endpoint.outputs.exit_code || '1' }}
          CN=${{ steps.audit-connectivity.outputs.exit_code || '1' }}
          DL=${{ steps.audit-delivery.outputs.exit_code || '1' }}
          
          if [[ "${EP}" -eq 0 && "${CN}" -eq 0 && "${DL}" -eq 0 ]]; then
            STATUS="success"
            echo "✅ Todos os audits passaram"
          elif [[ "${EP}" -eq 0 || "${CN}" -eq 0 || "${DL}" -eq 0 ]]; then
            STATUS="partial"
            echo "⚠️ Audit parcial"
          else
            STATUS="failure"
            echo "❌ Todos os audits falharam"
          fi
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 — commit & summary (Correção de permissões pull-requests)
  # ════════════════════════════════════════════════════════════════════════════
  commit:
    name: "💾 Commit & Summary"
    needs: [evolve, probe, watchlist, audit]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    env:
      EVOLVE_RESULT: ${{ needs.evolve.result }}
      EVOLVE_OUT_STATUS: ${{ needs.evolve.outputs.status || 'skipped' }}
      PROBE_RESULT: ${{ needs.probe.result }}
      WATCHLIST_RESULT: ${{ needs.watchlist.result }}
      AUDIT_RESULT: ${{ needs.audit.result }}
      AUDIT_STATUS: ${{ needs.audit.outputs.status || 'skipped' }}
      GENERATION: ${{ needs.evolve.outputs.generation || 'N/A' }}
      BEST_SCORE: ${{ needs.evolve.outputs.best_score || 'N/A' }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage source changes
        id: stage
        run: |
          git add \
            .github/workflows/*.yml \
            .github/workflows/*.yaml \
            core/*.py \
            modules/*.py \
            scripts/*.sh \
            scripts/*.py \
            setup/*.txt \
            docs/*.md \
            tests/*.py \
            atena \
            .gitignore \
            2>/dev/null || true

          for path in atena_evolution/*.json analysis_reports/*.md; do
            if [[ -f "$path" ]]; then
              git add "$path" 2>/dev/null || true
            fi
          done

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "📝 Sem mudanças para commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📝 Arquivos staged:"
            git diff --cached --name-only | head -20
          fi

      - name: Commit evolution artifacts
        if: steps.stage.outputs.changed == 'true'
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(evolution): cycle ${{ github.run_number }}
          
          Evolve: ${EVOLVE_OUT_STATUS}
          Audit: ${AUDIT_STATUS}
          Generation: ${GENERATION}
          Score: ${BEST_SCORE}
          timestamp: ${TS}
          
          [skip ci]"

      - name: Push with conflict resolution
        if: steps.stage.outputs.changed == 'true'
        timeout-minutes: 3
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME#refs/heads/}"
          
          git fetch origin "${BRANCH}" --no-tags --depth=50
          
          if ! git rebase --no-edit "origin/${BRANCH}" 2>/dev/null; then
            echo "⚠️ Rebase falhou, tentando merge..."
            git rebase --abort || true
            git merge --no-edit --strategy-option=ours "origin/${BRANCH}" \
              -m "chore(merge): resolve conflict [skip ci]"
          fi
          
          git push --force-with-lease origin "HEAD:${BRANCH}"
          echo "✅ Push realizado com sucesso"

      - name: Build rich summary
        if: always()
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          icon() {
            case "$1" in
              success) echo "✅" ;;
              partial)  echo "⚠️" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "❓" ;;
            esac
          }
          
          {
            echo "# 🔱 ATENA Self-Evolve — Ciclo ${{ github.run_number }}"
            echo ""
            echo "| Métrica | Valor |"
            echo "|---------|-------|"
            echo "| Run ID | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Timestamp | \`${TS}\` |"
            echo ""
            echo "### 📊 Resultados por Job"
            echo ""
            echo "| Job | Status | Detalhes |"
            echo "|-----|--------|----------|"
            echo "| 🧬 Evolve | $(icon ${EVOLVE_RESULT:-skipped}) \`${EVOLVE_OUT_STATUS}\` | Gen: ${GENERATION} / Score: ${BEST_SCORE} |"
            echo "| 🌐 Probe | $(icon ${PROBE_RESULT:-skipped}) \`${PROBE_RESULT:-skipped}\` | Monitoramento Ativo |"
            echo "| 👁️ Watchlist | $(icon ${WATCHLIST_RESULT:-skipped}) \`${WATCHLIST_RESULT:-skipped}\` | ${{ needs.watchlist.outputs.repos_found || 'N/A' }} repos |"
            echo "| 🔍 Audit | $(icon ${AUDIT_RESULT:-skipped}) \`${AUDIT_STATUS}\` | Health: ${{ needs.audit.outputs.endpoint_health || 'N/A' }}/100 |"
            echo ""

            if [[ -f "atena_evolution/atena_state.json" ]]; then
              echo "### 🧬 Estado da Evolução"
              echo ""
              echo "| Métrica | Valor |"
              echo "|---------|-------|"
              python3 << 'EOF'
import json, pathlib
try:
    s = json.loads(pathlib.Path('atena_evolution/atena_state.json').read_text())
