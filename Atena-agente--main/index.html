<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATENA Ω — AGI Ops</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b1020;
      color: #e8ecff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(920px, 92vw);
      background: #121a33;
      border: 1px solid #2a3566;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { margin-top: 0; font-size: 2rem; }
    .ok { color: #63ffa4; font-weight: 700; }
    .meta { color: #9fb0f5; }
    ul { line-height: 1.7; }
    a { color: #8db2ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
      background: #1c264a;
      border: 1px solid #33427b;
      border-radius: 8px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>🔱 ATENA Ω</h1>
    <p class="meta">Deploy operacional no Vercel ativo.</p>
    <p>Status: <span class="ok">ONLINE</span></p>
    <ul>
      <li>AGI Uplift: <code>./atena agi-uplift</code></li>
      <li>External Validation: <code>./atena agi-external-validation</code></li>
      <li>Production Gate: <code>./atena production-ready</code></li>
    </ul>
    <p>Repositório: <a href="https://github.com/AtenaAuto/ATENA-" target="_blank" rel="noreferrer">AtenaAuto/ATENA-</a></p>
  </main>
</body>
</html>
